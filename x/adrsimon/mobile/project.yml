name: Dust
options:
  bundleIdPrefix: com.dust
  deploymentTarget:
    iOS: "17.4"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Dust:
    type: application
    platform: iOS
    sources:
      - Dust
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.dust.mobile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Dust/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - dust
        UILaunchScreen: {}
