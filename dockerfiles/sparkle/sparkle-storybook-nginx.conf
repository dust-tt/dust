server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Redirect /playground to /playground/ so the SPA base path is correct
    location = /playground {
        return 301 /playground/;
    }

    # Playground SPA — assets are built with base=/playground/
    location /playground/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /playground/index.html;
    }

    # Storybook static site
    location / {
        root /usr/share/nginx/html/storybook;
        try_files $uri $uri/ =404;
    }
}
