name = "poke-dust-tt"
compatibility_date = "2025-01-01"
main = "./worker/poke.ts"

[assets]
directory = "./dist/poke"
not_found_handling = "none"
binding = "ASSETS"

# Custom domain poke.bleeding-edge.dust.tt (bound via Cloudflare dashboard).
[env.bleeding-edge]
name = "poke-bleeding-edge-dust-tt"

[env.bleeding-edge.assets]
directory = "./dist/poke"
not_found_handling = "none"
binding = "ASSETS"
