[SERVICE]
    flush        2
    daemon       off
    log_level    warn
    parsers_file /etc/fluent-bit/parsers.conf
    scripts_file /etc/fluent-bit/enrich.lua

# Single journal input (captures all: shell-stderr, fluent-bit, services)
[INPUT]
    name             systemd
    tag              sandbox.journal
    read_from_tail   off
    mem_buf_limit    20MB

# Parse nested JSON from journal MESSAGE field
[FILTER]
    name         parser
    match        sandbox.journal
    key_name     MESSAGE
    parser       json
    reserve_data on

# Only keep bash and audit entries (drop kernel, chronyd, etc.)
[FILTER]
    name          grep
    match         sandbox.journal
    regex         SYSLOG_IDENTIFIER ^(bash|audit)$

# Route bash entries to sandbox.stderr tag
[FILTER]
    name          rewrite_tag
    match         sandbox.journal
    rule          $SYSLOG_IDENTIFIER ^bash$ sandbox.stderr false

# Add source field for bash
[FILTER]
    name          record_modifier
    match         sandbox.stderr
    record        source bash
    record        input systemd

# Add source field for remaining journal entries (audit)
[FILTER]
    name          record_modifier
    match         sandbox.journal
    record        source journal
    record        input systemd

# Build human-readable message for Datadog display
[FILTER]
    name          lua
    match         *
    script        /etc/fluent-bit/enrich.lua
    call          enrich_message

[OUTPUT]
    name        datadog
    match       *
    host        ${DD_HOST}
    TLS         on
    compress    gzip
    apikey      ${DD_API_KEY}
    dd_service  sandbox-runner
    dd_source   e2b-sandbox
    dd_tags     env:prod,sandbox_id:${E2B_SANDBOX_ID},conversation_id:${CONVERSATION_ID},workspace_id:${WORKSPACE_ID}
