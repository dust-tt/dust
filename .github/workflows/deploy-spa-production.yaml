name: Deploy SPA to production

on:
  repository_dispatch:
    types: [deploy-spa-production]
  workflow_dispatch:
    inputs:
      app:
        description: "SPA to deploy to production (app or poke)"
        type: choice
        options:
          - app
          - poke
        required: true
      version_id:
        description: "Worker version ID to promote (from deploy-spa workflow)"
        type: string
        required: true

permissions:
  actions: read
  contents: write

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(
          (github.event.client_payload.app || inputs.app) == 'all'
            && '["app","poke"]'
            || format('["{0}"]', github.event.client_payload.app || inputs.app)
          ) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "22.22.0"

      - name: Resolve version ID
        id: version
        run: |
          # repository_dispatch: per-app version IDs in payload
          # workflow_dispatch: single version_id input
          VERSION_ID="${{ github.event.client_payload[format('spa_{0}_version_id', matrix.app)] || inputs.version_id }}"
          if [ -z "$VERSION_ID" ]; then
            echo "::error::No version ID provided for ${{ matrix.app }}. Cannot promote without an explicit version ID."
            exit 1
          fi
          echo "id=${VERSION_ID}" >> $GITHUB_OUTPUT
          echo "Promoting version: ${VERSION_ID}"

      - name: Promote version to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: front-spa
          command: versions deploy ${{ steps.version.outputs.id }}@100% --config wrangler-${{ matrix.app }}.toml -y

      - name: Create deploy tag
        if: ${{ github.event.client_payload.sha && github.event.client_payload.image_tag }}
        uses: actions/github-script@v6
        with:
          script: |
            const tag = `refs/tags/spa/${{ matrix.app }}/${{ github.event.client_payload.image_tag }}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: tag,
                sha: '${{ github.event.client_payload.sha }}',
              });
            } catch (e) {
              // Tag already exists (redeployment of same commit) — ignore.
              if (e.status !== 422) throw e;
            }

      - name: Notify Deploy Success
        if: ${{ github.event.client_payload.slack_thread_ts }}
        uses: ./.github/actions/slack-notify
        with:
          step: "spa_production_success"
          channel: ${{ github.event.client_payload.slack_channel }}
          thread_ts: ${{ github.event.client_payload.slack_thread_ts }}
          component: spa-${{ matrix.app }}
          image_tag: ${{ github.event.client_payload.image_tag }}
          slack_token: ${{ secrets.SLACK_BOT_TOKEN }}
          preview_url: https://${{ matrix.app }}.dust.tt

      - name: Notify Deploy Failure
        if: ${{ failure() && github.event.client_payload.slack_thread_ts }}
        uses: ./.github/actions/slack-notify
        with:
          step: "failure"
          channel: ${{ github.event.client_payload.slack_channel }}
          thread_ts: ${{ github.event.client_payload.slack_thread_ts }}
          component: spa-${{ matrix.app }}
          image_tag: ${{ github.event.client_payload.image_tag || 'unknown' }}
          slack_token: ${{ secrets.SLACK_BOT_TOKEN }}
