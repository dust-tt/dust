name: Sandbox Image Registry

on:
  workflow_call:
    outputs:
      images-built:
        description: "Number of images built"
        value: ${{ jobs.summary.outputs.built-count }}
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
  E2B_DOMAIN: e2b-juliett.dev

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      missing: ${{ steps.check.outputs.missing }}
      build-matrix: ${{ steps.check.outputs.matrix }}
      has-missing: ${{ steps.check.outputs.has-missing }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "22.22.0"
          build-sdks: "true"

      - name: Check sandbox images
        id: check
        working-directory: front
        run: |
          set -eo pipefail
          echo "Running sandbox image check..."
          if ! RESULT=$(npx tsx scripts/sandbox_image_check.ts --json 2>&1); then
            echo "::error::Sandbox image check failed"
            echo "$RESULT"
            exit 1
          fi
          echo "Check result:"
          echo "$RESULT"

          MISSING=$(echo "$RESULT" | jq -c '.result.missing')
          MATRIX=$(echo "$RESULT" | jq -c '{include: .result.buildMatrix}')
          HAS_MISSING=$(echo "$RESULT" | jq -r 'if (.result.missing | length) > 0 then "true" else "false" end')

          echo "missing=$MISSING" >> $GITHUB_OUTPUT
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "has-missing=$HAS_MISSING" >> $GITHUB_OUTPUT

  build-templates:
    needs: [check]
    if: needs.check.outputs.has-missing == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check.outputs.build-matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "22.22.0"
          build-sdks: "true"

      - name: Write service account JSON
        run: |
          echo '${{ secrets.SBX_GCP_ARTIFACT_RO_SERVICE_ACCOUNT_JSON }}' > /tmp/service-account.json

      - name: Build sandbox image
        working-directory: front
        env:
          SBX_GCP_ARTIFACT_SERVICE_ACCOUNT: /tmp/service-account.json
        run: |
          npx tsx scripts/sandbox_image_build.ts \
            --image ${{ matrix.image }} \
            --tag ${{ matrix.tag }} \
            --docker-registry us-central1-docker.pkg.dev/or1g1n-186209/dust-sbx \
            --confirm

      - name: Cleanup service account JSON
        if: always()
        run: rm -f /tmp/service-account.json

  summary:
    needs: [check, build-templates]
    if: always() && needs.check.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      built-count: ${{ steps.count.outputs.built }}
    steps:
      - name: Calculate built count
        id: count
        run: |
          if [ "${{ needs.check.outputs.has-missing }}" == "true" ]; then
            MISSING='${{ needs.check.outputs.missing }}'
            COUNT=$(echo "$MISSING" | jq 'length')
            echo "built=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "built=0" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## Sandbox Image Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.check.outputs.has-missing }}" == "true" ]; then
            echo "Built **${{ steps.count.outputs.built }}** missing images" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Missing images:" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            echo '${{ needs.check.outputs.missing }}' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "All required sandbox images already exist" >> $GITHUB_STEP_SUMMARY
          fi
