name: Build & Test (dust-sandbox)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      dust-sandbox-changed: ${{ steps.changes.outputs.dust-sandbox }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for relevant changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event.repository.default_branch }}
          filters: |
            dust-sandbox:
              - 'cli/dust-sandbox/**'
              - '.github/workflows/build-dust-sandbox.yml'

      - name: Workflow Decision Summary
        env:
          DUST_SANDBOX_CHANGES: ${{ steps.changes.outputs.dust-sandbox }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${DUST_SANDBOX_CHANGES}" == "true" ]; then
            echo "Workflow Decision: RUNNING TESTS"
            echo "dust-sandbox changes detected vs ${DEFAULT_BRANCH} - running tests"
          else
            echo "Workflow Decision: SKIPPING TESTS"
            echo "No dust-sandbox changes vs ${DEFAULT_BRANCH} - skipping tests"
          fi

  test:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.dust-sandbox-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install minimal stable
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: cargo, rustfmt, rust-std, rustc

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli/dust-sandbox

      - name: Lint
        working-directory: cli/dust-sandbox
        run: cargo fmt --all -- --check

      - name: Build
        working-directory: cli/dust-sandbox
        run: cargo build

      - name: Test
        working-directory: cli/dust-sandbox
        run: cargo test --all
