name: Lint & Build & Test (front)

on:
  push:
    paths:
      - package-lock.json
      - sdks/js/**
      - front/**
      - sparkle/**
      - .github/workflows/build-and-test-front.yml

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  tests:
    name: Test Shard ${{ matrix.shardIndex }} of ${{ matrix.shardTotal }}
    strategy:
      matrix:
        shardIndex: [ 1, 2, 3 ]
        shardTotal: [ 3 ]
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.2.5
        ports:
          - 5434:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "22.22.0"
          build-sdks: "true"
          build-sparkle: "true"
      - name: Install Postgres
        uses: dust-tt/postgresql-action@91c1ba371e7f9529945c312bb2883e9e0630063b
        with:
          postgresql docker image: mirror.gcr.io/postgres
          postgresql version: "14.13"
          postgresql db: front_test_shard_${{ matrix.shardIndex }}
          postgresql user: test
          postgresql password: test
          postgresql port: 5433
      - name: Install Sandbox
        run: sudo apt-get update && sudo apt-get install -y ripgrep fd-find sd
      - name: Run Tests
        working-directory: front
        env:
          FRONT_DATABASE_URI: "postgres://test:test@localhost:5433/front_test_shard_${{ matrix.shardIndex }}"
          REDIS_CACHE_URI: "redis://localhost:5434"
          REDIS_URI: "redis://localhost:5434"
          NODE_ENV: test
        run: npx tsx admin/db.ts && npm run test:ci -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --outputFile=junit-shard-${{ matrix.shardIndex }}.xml
      - name: Build Tests Report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "front/junit-shard-${{ matrix.shardIndex }}.xml"
          detailed_summary: true
          flaky_summary: true
          group_suite: true
          check_name: Tests Report (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
  tsgo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "22.22.0"
          build-sdks: "true"
          build-sparkle: "true"
      - name: Typecheck
        run: npm -w front run tsgo -- --version && npm -w front run tsgo
      - name: Build Temporal Bundles
        working-directory: front
        env:
          FRONT_DATABASE_URI: "postgres://fake:fake@localhost:5432/fake"
        run: npm run build:temporal-bundles
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "22.22.0"
      - name: Lint test filenames
        run: npm -w front run lint:test-filenames
      - name: Lint swagger annotations
        run: npm -w front run lint:swagger-annotations
      - name: Check swagger.json is up to date
        working-directory: front
        run: |
          npx next-swagger-doc-cli swagger.json
          if ! git diff --exit-code public/swagger.json; then
            echo "Error: public/swagger.json is out of date. Run 'npm run docs' in front/ and commit the result."
            exit 1
          fi
  worker-smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "22.22.0"
          build-sdks: "true"
      - name: Build Temporal Bundles
        working-directory: front
        env:
          FRONT_DATABASE_URI: "postgres://fake:fake@localhost:5432/fake"
        run: npm run build:temporal-bundles
      - name: Build Worker Bundle
        working-directory: front
        run: npm run build:workers
      - name: Run Worker Smoke Tests
        working-directory: front
        env:
          NODE_ENV: production
          USE_TEMPORAL_BUNDLES: "true"
          FRONT_DATABASE_URI: "postgres://fake:fake@localhost:5432/fake"
          LOG_LEVEL: error
        run: npm run test:workers:ci
      - name: Upload Test Results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "front/junit-workers.xml"
          check_name: Worker Smoke Tests
          detailed_summary: true
