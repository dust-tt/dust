name: Deploy SPA to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      app:
        description: "SPA to deploy"
        type: choice
        options:
          - app
          - poke
        required: true
      env:
        description: "The environment to use for API endpoints (prod or edge)"
        type: choice
        options:
          - prod
          - edge
        default: "prod"
        required: true
      region:
        description: "Default region for API endpoint (should stay US unless we have a reason to change it)"
        type: choice
        options:
          - eu
          - us
        default: "us"
        required: true
  workflow_call:
    inputs:
      app:
        description: "SPA to deploy"
        type: string
        required: true
      env:
        description: "The environment to use for API endpoints (prod or edge)"
        type: string
        default: "prod"
        required: true
      region:
        description: "Default region for API endpoint"
        type: string
        default: "us"
        required: true
      thread_ts:
        description: "Slack thread timestamp to post in (from parent deploy workflow)"
        type: string
        default: ""
        required: false

concurrency:
  group: deploy-spa-${{ inputs.app }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Prevent edge deploys from main
        if: ${{ github.ref == 'refs/heads/main' && inputs.env == 'edge' }}
        run: |
          echo "Error: Cannot deploy with env 'edge' from the main branch"
          exit 1

  prepare:
    needs: [check-branch]
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.short_sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Get short sha
        id: short_sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  notify-start:
    needs: [prepare]
    runs-on: ubuntu-latest
    outputs:
      thread_ts: ${{ inputs.thread_ts || steps.build_message.outputs.thread_ts }}
    steps:
      - uses: actions/checkout@v4

      - name: Notify SPA Deploy Start
        if: ${{ !inputs.thread_ts }}
        id: build_message
        uses: ./.github/actions/slack-notify
        with:
          step: "spa_start"
          channel: ${{ secrets.SLACK_CHANNEL_ID }}
          component: spa-${{ inputs.app }}
          image_tag: ${{ needs.prepare.outputs.short_sha }}
          slack_token: ${{ secrets.SLACK_BOT_TOKEN }}

  deploy:
    needs: [prepare, notify-start]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "22.22.0"
          build-sdks: "true"
          build-sparkle: "true"

      - name: Build SPA
        working-directory: front-spa
        env:
          VIRTUOSO_LICENSE_KEY: ${{ secrets.VIRTUOSO_LICENSE_KEY }}
          DATADOG_CLIENT_TOKEN: ${{ secrets.DD_CLIENT_TOKEN }}
          DATADOG_SERVICE: ${{ inputs.app }}-spa
          COMMIT_HASH: ${{ needs.prepare.outputs.short_sha }}
        run: |
          set -a
          source ../.github/configs/${{ inputs.region == 'eu' && 'europe-west1' || 'us-central1' }}/.env.${{ inputs.env }}
          # Override DUST_APP_URL: use branch preview URL for non-main branches.
          # Apply the same sanitization Cloudflare Pages uses for branch aliases:
          # lowercase, replace non-alphanumeric with '-', collapse multiple '-', trim '-', truncate to 28 chars.
          if [ "${{ github.ref_name }}" != "main" ]; then
            CF_BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/--*/-/g; s/^-//; s/-$//' | cut -c1-28 | sed 's/-$//')
            export DUST_APP_URL=https://${CF_BRANCH}--app.preview.dust.tt
          fi
          export BUILD_DATE=$(date +%s)
          set +a
          npm run build:${{ inputs.app }}

      - name: Upload sourcemaps to Datadog
        if: ${{ github.ref_name == 'main' }}
        working-directory: front-spa
        env:
          DATADOG_API_KEY: ${{ secrets.DD_API_KEY }}
          DATADOG_SITE: datadoghq.eu
        run: |
          if [ -z "$DATADOG_API_KEY" ]; then
            echo "DD_API_KEY not set, skipping sourcemap upload"
            exit 0
          fi
          npx --yes @datadog/datadog-ci sourcemaps upload dist/${{ inputs.app }}/assets \
            --minified-path-prefix=/assets/ \
            --repository-url=https://github.com/dust-tt/dust \
            --project-path=front-spa \
            --release-version=${{ github.sha }} \
            --service=${{ inputs.app }}-spa-browser

      - name: Deploy to preview branch
        id: cf_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: front-spa
          command: pages deploy dist/${{ inputs.app }} --project-name=${{ inputs.app }}-dust-tt --branch=${{ github.ref_name == 'main' && format('staging-{0}', github.sha) || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive preview URL from Cloudflare deployment URL
        id: preview_url
        run: |
          # Cloudflare deployment URL looks like: https://<branch-alias>.<project>.pages.dev
          # We extract the branch alias and transform to our proxy: https://<branch-alias>--<app>.preview.dust.tt
          CF_URL="${{ steps.cf_deploy.outputs.deployment-url }}"
          # Extract the branch alias (everything before .<project>.pages.dev)
          BRANCH_ALIAS=$(echo "$CF_URL" | sed -E 's|https://([^.]+)\..+\.pages\.dev|\1|')
          PREVIEW_URL="https://${BRANCH_ALIAS}--${{ inputs.app }}.preview.dust.tt"
          echo "url=${PREVIEW_URL}" >> $GITHUB_OUTPUT

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist-${{ inputs.app }}
          path: front-spa/dist/${{ inputs.app }}
          retention-days: 1

      - name: Summary
        run: |
          echo "### SPA Deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ inputs.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.preview_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Deploy Success
        uses: ./.github/actions/slack-notify
        with:
          step: ${{ 'spa_preview_success' }}
          channel: ${{ secrets.SLACK_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-start.outputs.thread_ts }}
          component: spa-${{ inputs.app }}
          image_tag: ${{ needs.prepare.outputs.short_sha }}
          slack_token: ${{ secrets.SLACK_BOT_TOKEN }}
          preview_url: ${{ steps.preview_url.outputs.url }}

      - name: Notify Failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          step: "failure"
          channel: ${{ secrets.SLACK_CHANNEL_ID }}
          component: spa-${{ inputs.app }}
          image_tag: ${{ needs.prepare.outputs.short_sha }}
          slack_token: ${{ secrets.SLACK_BOT_TOKEN }}
          thread_ts: "${{ needs.notify-start.outputs.thread_ts }}"
